name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      # Fast, deterministic suite. Playwright e2e (tests/e2e) needs browser
      # binaries + a live demo server, so it runs separately/locally, not in
      # the merge gate.
      - name: Test
        run: pytest -q --ignore=tests/e2e
